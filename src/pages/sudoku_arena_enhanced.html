
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --ink:#1a1a2e;--ink2:#4a4a6a;--ink3:#9898b8;
    --surface:#f8f7ff;--surface2:#f0eeff;--surface3:#e8e4ff;
    --accent:#6c47ff;--accent2:#9b77ff;--accent3:#c4aaff;
    --gold:#f5a623;--emerald:#2dd4a1;--rose:#ff5fa0;
    --cell-size:44px;--grid-border:2px solid #1a1a2e;
  }
  body{font-family:'Outfit',sans-serif;background:var(--surface);color:var(--ink);min-height:100vh;overflow-x:hidden}

  /* AUTH SCREEN */
  #auth-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:520px;padding:2rem;animation:fadeUp .5s ease}
  .auth-logo{font-family:'DM Serif Display',serif;font-size:3rem;color:var(--accent);letter-spacing:-1px;margin-bottom:.25rem}
  .auth-tagline{color:var(--ink3);font-size:.9rem;margin-bottom:2.5rem;font-weight:300}
  .auth-card{background:#fff;border:1.5px solid var(--surface3);border-radius:20px;padding:2rem;width:100%;max-width:360px;box-shadow:0 8px 40px rgba(108,71,255,.08)}
  .auth-title{font-size:1.1rem;font-weight:600;margin-bottom:1.5rem;color:var(--ink);text-align:center}
  .auth-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:.8rem 1.2rem;border-radius:12px;border:1.5px solid;font-family:'Outfit',sans-serif;font-size:.9rem;font-weight:500;cursor:pointer;transition:all .18s ease;margin-bottom:.75rem}
  .btn-google{background:#fff;border-color:#e0e0e0;color:#3c3c3c}
  .btn-google:hover{background:#f5f5f5;border-color:#ccc;transform:translateY(-1px)}
  .btn-guest{background:var(--surface2);border-color:var(--accent3);color:var(--accent)}
  .btn-guest:hover{background:var(--surface3);transform:translateY(-1px)}
  .auth-divider{display:flex;align-items:center;gap:12px;margin:.25rem 0 1rem;color:var(--ink3);font-size:.8rem}
  .auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--surface3)}
  .google-icon{width:18px;height:18px}

  /* GAME SCREEN */
  #game-screen{display:none;padding:0;flex-direction:column}
  header{background:#fff;border-bottom:1.5px solid var(--surface3);padding:.75rem 1.25rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
  .logo-sm{font-family:'DM Serif Display',serif;font-size:1.4rem;color:var(--accent);letter-spacing:-.5px}
  .user-chip{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--surface3);border-radius:20px;padding:.35rem .85rem;font-size:.82rem;color:var(--ink2);cursor:pointer}
  .user-chip:hover{background:var(--surface3)}
  .avatar{width:22px;height:22px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:.65rem;color:#fff;font-weight:600}

  main{display:grid;grid-template-columns:1fr;gap:1rem;padding:1rem;max-width:900px;margin:0 auto;width:100%}
  @media(min-width:650px){main{grid-template-columns:auto 1fr}}

  /* CONTROLS BAR */
  .controls-bar{display:flex;flex-wrap:wrap;gap:.5rem;align-items:center;margin-bottom:.5rem}
  .stat-pill{background:#fff;border:1px solid var(--surface3);border-radius:20px;padding:.3rem .85rem;font-size:.82rem;color:var(--ink2);display:flex;align-items:center;gap:5px}
  .stat-val{font-family:'DM Mono',monospace;font-weight:500;color:var(--ink);font-size:.88rem}
  .diff-btns{display:flex;gap:.4rem;margin-left:auto}
  .diff-btn{border:1.5px solid var(--surface3);background:#fff;border-radius:8px;padding:.3rem .7rem;font-size:.78rem;font-weight:500;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .15s}
  .diff-btn:hover,.diff-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}

  /* GRID */
  .grid-wrap{display:inline-block;background:#fff;border:var(--grid-border);border-radius:16px;padding:.6rem;box-shadow:0 4px 24px rgba(108,71,255,.1)}
  .sudoku-grid{display:grid;grid-template-columns:repeat(9,var(--cell-size));grid-template-rows:repeat(9,var(--cell-size));gap:0;border:none}
  .cell{width:var(--cell-size);height:var(--cell-size);display:flex;align-items:center;justify-content:center;font-size:1.05rem;font-weight:500;cursor:pointer;transition:background .1s,color .1s;border:1px solid #e8e4ff;position:relative;user-select:none;outline:none;border-radius:0;color:var(--ink)}
  .cell:focus{z-index:2}
  .cell.fixed{color:var(--ink);font-weight:600;background:#f8f7ff}
  .cell.user-val{color:var(--accent);font-weight:600}
  .cell.selected{background:#ede8ff !important;color:var(--accent) !important;z-index:3}
  .cell.highlight{background:#f4f0ff}
  .cell.error{color:var(--rose) !important;background:#fff0f5 !important}
  .cell:not(.fixed):hover{background:#f0ecff}
  /* box borders */
  .cell.box-right{border-right:var(--grid-border)}
  .cell.box-bottom{border-bottom:var(--grid-border)}

  /* SIDE PANEL */
  .side-panel{display:flex;flex-direction:column;gap:.75rem}
  .panel-card{background:#fff;border:1.5px solid var(--surface3);border-radius:16px;padding:1rem 1.1rem}
  .panel-label{font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--ink3);margin-bottom:.75rem}

  /* NUMBER PAD */
  .numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:.45rem}
  .num-btn{height:44px;border:1.5px solid var(--surface3);background:var(--surface);border-radius:10px;font-size:1.1rem;font-weight:600;color:var(--ink);cursor:pointer;font-family:'DM Mono',monospace;transition:all .15s;display:flex;align-items:center;justify-content:center}
  .num-btn:hover{background:var(--surface3);border-color:var(--accent3);color:var(--accent)}
  .num-btn:active{transform:scale(.93)}
  .num-btn.used{opacity:.35}
  .erase-btn{margin-top:.5rem;width:100%;height:36px;border:1.5px solid #ffd0e0;background:#fff8fb;border-radius:10px;color:var(--rose);font-weight:500;font-size:.85rem;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .15s}
  .erase-btn:hover{background:#ffe8f0}

  /* MASCOT */
  .mascot-face{font-family:'DM Mono',monospace;font-size:1.4rem;color:var(--accent);margin-bottom:.5rem}
  .mascot-msg{font-size:.83rem;color:var(--ink2);line-height:1.5}
  .mascot-toggle{display:flex;align-items:center;gap:6px;font-size:.78rem;color:var(--ink3);cursor:pointer;margin-top:.75rem}
  .toggle-switch{width:28px;height:16px;background:var(--surface3);border-radius:8px;position:relative;transition:background .2s}
  .toggle-switch.on{background:var(--accent)}
  .toggle-knob{width:12px;height:12px;background:#fff;border-radius:50%;position:absolute;top:2px;left:2px;transition:left .2s}
  .toggle-switch.on .toggle-knob{left:14px}

  /* WIN BANNER */
  #win-banner{display:none;position:fixed;inset:0;background:rgba(26,26,46,.7);z-index:100;align-items:center;justify-content:center;animation:fadeUp .3s ease}
  .win-card{background:#fff;border-radius:24px;padding:2.5rem 2rem;text-align:center;max-width:320px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.2)}
  .win-emoji{font-size:3rem;margin-bottom:.75rem}
  .win-title{font-family:'DM Serif Display',serif;font-size:1.8rem;color:var(--accent);margin-bottom:.5rem}
  .win-stats{display:flex;justify-content:center;gap:1.5rem;margin:1rem 0 1.5rem}
  .win-stat{text-align:center}
  .win-stat-val{font-family:'DM Mono',monospace;font-size:1.3rem;font-weight:500;color:var(--ink)}
  .win-stat-label{font-size:.75rem;color:var(--ink3);margin-top:2px}
  .win-btn{background:var(--accent);color:#fff;border:none;border-radius:12px;padding:.7rem 2rem;font-size:.9rem;font-weight:600;cursor:pointer;font-family:'Outfit',sans-serif;transition:opacity .15s}
  .win-btn:hover{opacity:.85}
  .win-close{background:none;border:1px solid var(--surface3);color:var(--ink2);margin-top:.5rem;width:100%}

  @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
  .shake{animation:shake .25s ease}
  @keyframes cellPop{0%{transform:scale(1)}50%{transform:scale(1.18)}100%{transform:scale(1)}}
  .pop{animation:cellPop .2s ease}
</style>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="auth-logo">Sudoku Arena</div>
  <div class="auth-tagline">Fast moves, clean focus, gentle feedback</div>
  <div class="auth-card">
    <div class="auth-title">Welcome back</div>
    <button class="auth-btn btn-google" onclick="loginGoogle()">
      <svg class="google-icon" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>
    <div class="auth-divider">or</div>
    <button class="auth-btn btn-guest" onclick="loginGuest()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="7" r="4"/><path d="M6 21v-2a6 6 0 0 1 12 0v2"/></svg>
      Play as Guest
    </button>
    <p style="font-size:.73rem;color:var(--ink3);text-align:center;margin-top:.5rem">No account needed — jump right in</p>
  </div>
</div>

<!-- GAME SCREEN -->
<div id="game-screen">
  <header>
    <div class="logo-sm">Sudoku Arena</div>
    <div style="display:flex;align-items:center;gap:.75rem">
      <div id="user-chip" class="user-chip">
        <div id="user-avatar" class="avatar">G</div>
        <span id="user-name">Guest</span>
      </div>
      <button onclick="logoutUser()" style="border:1px solid var(--surface3);background:#fff;border-radius:8px;padding:.3rem .7rem;font-size:.78rem;cursor:pointer;color:var(--ink2);font-family:'Outfit',sans-serif">Sign out</button>
    </div>
  </header>

  <main>
    <div>
      <div class="controls-bar">
        <div class="stat-pill">⏱ <span class="stat-val" id="timer">00:00</span></div>
        <div class="stat-pill">✕ <span class="stat-val" id="mistakes-display">0</span><span style="font-size:.75rem;margin-left:2px;color:var(--ink3)">/5</span></div>
        <div class="stat-pill" id="diff-badge" style="background:var(--surface3);color:var(--accent)">Easy</div>
        <div class="diff-btns">
          <button class="diff-btn active" onclick="newGame('easy',this)">Easy</button>
          <button class="diff-btn" onclick="newGame('medium',this)">Medium</button>
          <button class="diff-btn" onclick="newGame('hard',this)">Hard</button>
        </div>
      </div>
      <div class="grid-wrap">
        <div class="sudoku-grid" id="grid"></div>
      </div>
    </div>

    <div class="side-panel">
      <div class="panel-card">
        <div class="panel-label">Number Input</div>
        <div class="numpad" id="numpad">
          <!-- built by JS -->
        </div>
        <button class="erase-btn" onclick="eraseCell()">✕ Erase</button>
      </div>
      <div class="panel-card" id="mascot-card">
        <div class="panel-label">Mascot Coach</div>
        <div id="mascot-face" class="mascot-face">(o_o)</div>
        <div id="mascot-msg" class="mascot-msg">Pick a cell to begin. You got this.</div>
        <div class="mascot-toggle" onclick="toggleMascot()">
          <div class="toggle-switch on" id="mascot-toggle"><div class="toggle-knob"></div></div>
          <span id="mascot-toggle-label">Coach enabled</span>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- WIN BANNER -->
<div id="win-banner">
  <div class="win-card">
    <div class="win-emoji">\\(^o^)/</div>
    <div class="win-title">Puzzle Solved!</div>
    <div class="win-stats">
      <div class="win-stat"><div class="win-stat-val" id="win-time">--</div><div class="win-stat-label">Time</div></div>
      <div class="win-stat"><div class="win-stat-val" id="win-mistakes">--</div><div class="win-stat-label">Mistakes</div></div>
      <div class="win-stat"><div class="win-stat-val" id="win-diff">--</div><div class="win-stat-label">Difficulty</div></div>
    </div>
    <button class="win-btn" onclick="newGame(state.difficulty);closeWin()">Play Again</button>
    <br>
    <button class="win-btn win-close" onclick="closeWin()">Close</button>
  </div>
</div>

<script>
const MASKS={easy:36,medium:46,hard:54};
const MASCOTS={happy:'(*^_^*)',neutral:'(o_o)',warning:'(>_<)',win:'\\\\(^o^)/'}
const MSGS={
  happy:'Nice. Now place a value or erase to adjust.',
  neutral:'Pick a cell to begin. You got this.',
  warning:'Slow down, scan rows/columns before placing.',
  win:'Brilliant finish. You solved the puzzle!'
}

const state={
  grid:[],solution:[],selected:null,mistakes:0,seconds:0,
  timer:null,difficulty:'easy',win:false,mascotOn:true,userType:'guest',userName:'Guest'
}

// ─── AUTH ───
function loginGoogle(){
  state.userType='google';state.userName='Player';
  document.getElementById('user-name').textContent='Player';
  document.getElementById('user-avatar').textContent='P';
  showGame();
}
function loginGuest(){
  state.userType='guest';state.userName='Guest';
  showGame();
}
function logoutUser(){
  clearInterval(state.timer);
  document.getElementById('game-screen').style.display='none';
  document.getElementById('auth-screen').style.display='flex';
}
function showGame(){
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('game-screen').style.display='flex';
  buildNumpad();
  newGame('easy');
}

// ─── SUDOKU ENGINE ───
function makeBase(){
  const b=Array.from({length:9},()=>Array(9).fill(0));
  fill(b,0,0);return b;
}
function fill(b,r,c){
  if(r===9)return true;
  const nr=c===8?r+1:r,nc=c===8?0:c+1;
  const nums=[1,2,3,4,5,6,7,8,9].sort(()=>Math.random()-.5);
  for(const n of nums){if(safe(b,r,c,n)){b[r][c]=n;if(fill(b,nr,nc))return true;b[r][c]=0;}}
  return false;
}
function safe(b,r,c,n){
  for(let i=0;i<9;i++){if(b[r][i]===n||b[i][c]===n)return false;}
  const br=Math.floor(r/3)*3,bc=Math.floor(c/3)*3;
  for(let i=0;i<3;i++)for(let j=0;j<3;j++)if(b[br+i][bc+j]===n)return false;
  return true;
}
function copyGrid(g){return g.map(r=>[...r]);}
function newGame(diff,btn){
  state.difficulty=diff||'easy';
  document.getElementById('diff-badge').textContent=state.difficulty.charAt(0).toUpperCase()+state.difficulty.slice(1);
  document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  else document.querySelectorAll('.diff-btn').forEach(b=>{if(b.textContent.toLowerCase()===state.difficulty)b.classList.add('active');});
  const sol=makeBase();state.solution=copyGrid(sol);
  const puzzle=copyGrid(sol);
  let removed=0,target=MASKS[state.difficulty];
  while(removed<target){const r=Math.floor(Math.random()*9),c=Math.floor(Math.random()*9);if(puzzle[r][c]!==0){puzzle[r][c]=0;removed++;}}
  state.grid=puzzle.map((row,r)=>row.map((v,c)=>({value:v,fixed:v!==0,error:false,row:r,col:c})));
  state.mistakes=0;state.seconds=0;state.win=false;state.selected=null;
  document.getElementById('mistakes-display').textContent='0';
  clearInterval(state.timer);
  state.timer=setInterval(()=>{state.seconds++;updateTimer();},1000);
  updateTimer();renderGrid();updateNumpad();updateMascot();
}
function updateTimer(){
  const mm=String(Math.floor(state.seconds/60)).padStart(2,'0');
  const ss=String(state.seconds%60).padStart(2,'0');
  document.getElementById('timer').textContent=`${mm}:${ss}`;
}

// ─── GRID RENDER ───
function renderGrid(){
  const el=document.getElementById('grid');el.innerHTML='';
  state.grid.forEach((row,r)=>row.forEach((cell,c)=>{
    const div=document.createElement('div');div.className='cell';
    div.tabIndex=0;div.dataset.r=r;div.dataset.c=c;
    if(cell.fixed)div.classList.add('fixed');
    if(cell.error)div.classList.add('error');
    if(cell.value&&!cell.fixed)div.classList.add('user-val');
    if(c%3===2&&c!==8)div.classList.add('box-right');
    if(r%3===2&&r!==8)div.classList.add('box-bottom');
    if(state.selected){
      const s=state.selected;
      if(s.r===r&&s.c===c)div.classList.add('selected');
      else if(s.r===r||s.c===c||
        (Math.floor(s.r/3)===Math.floor(r/3)&&Math.floor(s.c/3)===Math.floor(c/3)))
        div.classList.add('highlight');
    }
    div.textContent=cell.value||'';
    div.addEventListener('click',()=>selectCell(r,c));
    div.addEventListener('keydown',e=>{
      if(/^[1-9]$/.test(e.key))placeNum(r,c,+e.key);
      if(e.key==='Backspace'||e.key==='Delete'||e.key==='0')clearCell(r,c);
      if(e.key==='ArrowRight')focusCell(r,Math.min(8,c+1));
      if(e.key==='ArrowLeft')focusCell(r,Math.max(0,c-1));
      if(e.key==='ArrowDown')focusCell(Math.min(8,r+1),c);
      if(e.key==='ArrowUp')focusCell(Math.max(0,r-1),c);
    });
    el.appendChild(div);
  }));
}
function focusCell(r,c){selectCell(r,c);document.querySelector(`.cell[data-r="${r}"][data-c="${c}"]`)?.focus();}
function selectCell(r,c){state.selected={r,c};renderGrid();updateMascot();}
function placeNum(r,c,n){
  const cell=state.grid[r][c];
  if(cell.fixed||state.win)return;
  cell.error=false;
  if(state.solution[r][c]===n){
    cell.value=n;
    const el=document.querySelector(`.cell[data-r="${r}"][data-c="${c}"]`);
    if(el){el.classList.add('pop');setTimeout(()=>el.classList.remove('pop'),200);}
    checkWin();
  } else {
    state.mistakes++;
    document.getElementById('mistakes-display').textContent=state.mistakes;
    cell.error=true;cell.value=n;
    const el=document.querySelector(`.cell[data-r="${r}"][data-c="${c}"]`);
    if(el){el.classList.add('shake');setTimeout(()=>el.classList.remove('shake'),300);}
  }
  renderGrid();updateNumpad();updateMascot();
}
function eraseCell(){if(!state.selected)return;const{r,c}=state.selected;clearCell(r,c);}
function clearCell(r,c){
  const cell=state.grid[r][c];if(cell.fixed||state.win)return;
  cell.value=0;cell.error=false;renderGrid();updateNumpad();updateMascot();
}
function checkWin(){
  for(let r=0;r<9;r++)for(let c=0;c<9;c++){
    const v=state.grid[r][c].value;if(!v||v!==state.solution[r][c])return;
  }
  state.win=true;clearInterval(state.timer);
  const mm=String(Math.floor(state.seconds/60)).padStart(2,'0');
  const ss=String(state.seconds%60).padStart(2,'0');
  document.getElementById('win-time').textContent=`${mm}:${ss}`;
  document.getElementById('win-mistakes').textContent=state.mistakes;
  document.getElementById('win-diff').textContent=state.difficulty;
  document.getElementById('win-banner').style.display='flex';
  updateMascot();
}
function closeWin(){document.getElementById('win-banner').style.display='none';}

// ─── NUMPAD ───
function buildNumpad(){
  const pad=document.getElementById('numpad');pad.innerHTML='';
  for(let n=1;n<=9;n++){
    const btn=document.createElement('button');
    btn.className='num-btn';btn.id=`num-${n}`;btn.textContent=n;
    btn.addEventListener('click',()=>{if(state.selected)placeNum(state.selected.r,state.selected.c,n);});
    pad.appendChild(btn);
  }
}
function updateNumpad(){
  if(!state.grid.length)return;
  const counts=Array(10).fill(0);
  state.grid.forEach(row=>row.forEach(c=>{if(c.value&&!c.error)counts[c.value]++;}));
  for(let n=1;n<=9;n++){
    const btn=document.getElementById(`num-${n}`);
    if(btn)btn.classList.toggle('used',counts[n]>=9);
  }
}

// ─── MASCOT ───
function updateMascot(){
  if(!state.mascotOn)return;
  let mood='neutral';
  if(state.win)mood='win';
  else if(state.mistakes>=5)mood='warning';
  else if(state.selected)mood='happy';
  document.getElementById('mascot-face').textContent=MASCOTS[mood];
  document.getElementById('mascot-msg').textContent=MSGS[mood];
}
function toggleMascot(){
  state.mascotOn=!state.mascotOn;
  const t=document.getElementById('mascot-toggle');
  const lbl=document.getElementById('mascot-toggle-label');
  t.classList.toggle('on',state.mascotOn);
  lbl.textContent=state.mascotOn?'Coach enabled':'Coach disabled';
  const body=document.getElementById('mascot-card').querySelector('.mascot-face');
  const msg=document.getElementById('mascot-msg');
  if(body)body.style.opacity=state.mascotOn?'1':'.35';
  if(msg)msg.style.opacity=state.mascotOn?'1':'.35';
  if(state.mascotOn)updateMascot();
}
</script>
